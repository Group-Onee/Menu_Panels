# SonarQube Analysis Configuration

# Project identification
sonar.projectKey=jmenu-task
sonar.projectName=JMenu Task Project
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8
sonar.java.source=21
sonar.java.target=21

# Exclude test files and generated code
sonar.exclusions=**/target/**,**/test/**,**/Test*.java
sonar.test.inclusions=**/test/**,**/*Test*.java

# Code coverage (optional - requires JaCoCo)
sonar.java.coveragePlugin=jacoco
sonar.jacoco.reportPath=target/jacoco.exec

# Issue severity thresholds
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Security (SAST) analysis
sonar.security.config.file=sonar-security.properties
